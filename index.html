<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Budget</title>
    <!-- Tailwind CSS -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <!-- Google Fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./style.css">
    <style type="text/tailwindcss">
    @theme {
      --font-sans: "Geist", sans-serif;
    }
    </style>
</head>

<body class="bg-[#fafafa] text-gray-900 font-sans antialiased min-h-screen py-10 px-4 sm:px-6 selection:bg-gray-200">

  <div class="max-w-[460px] mx-auto space-y-10 relative">

    <!-- Top Bar -->
    <header class="flex items-center justify-between pt-2 gap-4">
      <h1 class="text-xl font-semibold tracking-tight">Budget.</h1>
      <div class="flex items-center gap-3">
        <select id="currency-select"
          class="text-xs font-semibold bg-white border border-gray-200 rounded-lg px-2.5 py-1.5 text-gray-700 focus:outline-none">
        </select>
        <div id="currency-badge"
          class="w-8 h-8 text-white rounded-full flex items-center justify-center font-bold text-sm shadow-md theme-accent-bg">
          $
        </div>
      </div>
    </header>

    <!-- Balance Section -->
    <section class="bg-white rounded-[2rem] p-8 shadow-[0_8px_30px_rgb(0,0,0,0.03)] border border-gray-100/50">
      <p class="text-[0.65rem] font-semibold text-gray-400 uppercase tracking-[0.2em] mb-2">Total Balance</p>
      <h2 id="balance" class="text-5xl font-bold tracking-tighter text-gray-900 mb-8">$0.00</h2>

      <div class="flex items-center justify-between pt-6 border-t border-gray-100">
        <div>
          <div class="flex items-center gap-1.5 mb-1">
            <div class="w-1.5 h-1.5 rounded-full bg-emerald-500"></div>
            <p class="text-[0.65rem] font-semibold text-gray-400 uppercase tracking-widest">Income</p>
          </div>
          <p id="total-income" class="text-lg font-semibold text-gray-900">$0.00</p>
        </div>
        <div class="text-right">
          <div class="flex items-center justify-end gap-1.5 mb-1">
            <p class="text-[0.65rem] font-semibold text-gray-400 uppercase tracking-widest">Expense</p>
            <div class="w-1.5 h-1.5 rounded-full bg-red-500"></div>
          </div>
          <p id="total-expense" class="text-lg font-semibold text-gray-900">$0.00</p>
        </div>
      </div>
    </section>

    <!-- Add Transaction Form -->
    <section class="bg-white rounded-[2rem] p-7 shadow-[0_8px_30px_rgb(0,0,0,0.03)] border border-gray-100/50">
      <div class="flex items-center justify-between mb-6">
        <h3 class="text-sm font-semibold text-gray-900">New Transaction</h3>
      </div>

      <div class="space-y-5">
        <!-- Segmented Control -->
        <div class="flex p-1 bg-gray-50 rounded-xl border border-gray-100">
          <button id="btn-income" class="flex-1 py-2 text-xs font-semibold rounded-lg transition-all"
            onclick="setType('income')">Income</button>
          <button id="btn-expense" class="flex-1 py-2 text-xs font-semibold rounded-lg transition-all"
            onclick="setType('expense')">Expense</button>
        </div>

        <div>
          <input type="text" id="desc" placeholder="What is this for?"
            class="w-full bg-transparent border-b border-gray-200 py-3 text-gray-900 placeholder-gray-400 focus:outline-none focus:border-theme transition-colors text-base font-medium">
        </div>

        <div class="flex gap-4">
          <div class="flex-1 relative">
            <span id="amount-symbol" class="absolute left-0 top-3 text-gray-400 text-base font-medium">$</span>
            <input type="number" id="amount" placeholder="0.00"
              class="w-full bg-transparent border-b border-gray-200 py-3 pl-4 text-gray-900 placeholder-gray-400 focus:outline-none focus:border-theme transition-colors text-base font-medium"
              min="0" step="0.01">
          </div>
          <div class="flex-1 relative">
            <select id="category"
              class="w-full bg-transparent border-b border-gray-200 py-3 text-gray-900 focus:outline-none focus:border-theme transition-colors text-base font-medium appearance-none cursor-pointer pr-6">
            </select>
          </div>
        </div>

        <button id="add-tx-btn" onclick="addTransaction()"
          class="w-full text-white rounded-xl py-3.5 text-sm font-semibold transition-all active:scale-[0.98] mt-2 shadow-lg theme-accent-bg theme-accent-hover">Add
          <span class="ml-1 font-normal opacity-70">to record</span></button>
      </div>
    </section>

    <!-- Transactions List -->
    <section>
      <div class="flex items-center justify-between mb-5 px-1 pt-2">
        <h3 class="text-sm font-semibold text-gray-900">Recent Transactions</h3>
        <button onclick="clearAll()"
          class="text-xs font-semibold text-gray-400 hover:text-red-500 transition-colors">Clear All</button>
      </div>

      <div id="tx-list" class="space-y-3">
        <!-- populated by js -->
      </div>
    </section>

  </div>

  <!-- Toast Message -->
  <div id="toast"
    class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-5 py-3 rounded-full text-xs font-medium shadow-xl transition-all duration-300 translate-y-20 opacity-0 z-50 flex items-center gap-2">
  </div>

  <script src="./script.js"></script>
</body>

</html>
